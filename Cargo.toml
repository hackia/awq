[package]
name = "awq"
version = "0.0.0"
edition = "2021"
authors = ["hackia"]
license = "AGPL -3.0"
readme = "README.md"
description = "Web utilitities"
repository = "https://github.com/hackia/awq"
homepage = "https://github.com/hackia/awq/wiki"
keywords = ["cli", "hacking", "web", "automation", "security"]

[dependencies]
crossterm = "0.28.1"
ratatui = { version = "0.29.0", features = ["all-widgets", "document-features", "serde"] }
reqwest = { version = "0.12.12", features = ["blocking", "json"] }
serde_json = "1.0.138"
serde = { version = "1.0.217", features = ["derive"] }
chrono = "0.4.39"
