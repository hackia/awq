[package]
name = "awq"
version = "0.0.0"
authors = ["hackia"]
edition = "2021"
description = "Web utilitities"
readme = "README.md"
homepage = "https://github.com/hackia/awq/wiki"
repository = "https://github.com/hackia/awq"
license = "AGPL -3.0"
keywords = ["automation", "cli", "hacking", "security", "web"]

[dependencies]
base64 = "0.22.1"
chrono = "0.4.40"
diff = "0.1.13"
ed25519-dalek = { version = "2", features = ["rand_core", "serde"] }
hex = "0.4.3"
inquire = { version = "0.7.5", features = ["chrono", "console", "date", "editor"] }
rand = "0.9.0"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
sha2 = "0.10.8"
soul = "0.1.0"
